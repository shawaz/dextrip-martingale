name: Keep Railway Bot Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway health check
        run: |
          curl -sS --max-time 10 "https://loving-rejoicing-production-592c.up.railway.app" || echo "Ping failed (expected if sleeping)"
